name: build

on:
  push:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            name: linux-amd64
            bin: pow

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
            bin: pow

          - os: macos-15-intel
            target: x86_64-apple-darwin
            name: macos-amd64
            bin: pow

          - os: macos-15
            target: aarch64-apple-darwin
            name: macos-arm64
            bin: pow

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build one binary
        run: |
          cargo build --release --target ${{ matrix.target }} --bin ${{ matrix.bin }}

      - name: Package one file
        shell: bash
        run: |
          mkdir -p out
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "out/${{ matrix.bin }}-${{ matrix.name }}"
          chmod +x "out/${{ matrix.bin }}-${{ matrix.name }}"

      - name: Upload one artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: out/${{ matrix.bin }}-${{ matrix.name }}

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: |
          find dist -type f -maxdepth 1 -print

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
